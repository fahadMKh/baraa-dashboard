<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشروع بارع بجمعية الراحين</title>

  <!-- الخطوط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- الأنماط -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">جارٍ تحميل البيانات...</div>
  </div>

  <!-- الشريط العلوي -->
  <header class="header">
    <div class="header-logo">
      <div class="logo-badge">
        <img src="logo.svg" alt="شعار بارع" class="logo-img">
      </div>
      <div class="header-title">
        <h1>مشروع بارع بجمعية الراحين</h1>
        <p>منصة متابعة إنجاز البطاقات وجودة التنفيذ</p>
      </div>
    </div>
    <div class="header-actions">
      <!-- زر الفلتر + لوحته -->
      <div class="filter-wrapper">
        <button class="btn-filter" id="btn-filter" onclick="app.toggleFilter()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          تصفية
          <span id="filter-badge" class="filter-badge hidden"></span>
        </button>

        <div id="filter-panel" class="filter-panel hidden">
          <!-- الفصول -->
          <div class="fp-section">
            <div class="fp-title">الفصل الدراسي</div>
            <div class="fp-shortcuts">
              <button class="fp-shortcut" onclick="app.selectCurrentSemester()">الفصل الحالي</button>
              <button class="fp-shortcut" onclick="app.clearSemesters()">جميع الفصول</button>
            </div>
            <div id="semester-checks" class="fp-checks"></div>
          </div>

          <!-- النطاق الزمني -->
          <div class="fp-section">
            <label class="fp-toggle-row">
              <input type="checkbox" id="use-date-range" onchange="app.toggleDateRange(this.checked)">
              <span>نطاق زمني مخصص</span>
            </label>
            <div id="date-range-inputs" class="fp-dates hidden">
              <label class="fp-date-row">
                <span>من</span>
                <input type="date" id="date-from">
              </label>
              <label class="fp-date-row">
                <span>إلى</span>
                <input type="date" id="date-to">
              </label>
            </div>
          </div>

          <!-- أزرار الإجراءات -->
          <div class="fp-actions">
            <button class="fp-apply" onclick="app.applyFilter()">تطبيق</button>
            <button class="fp-reset"  onclick="app.resetFilter()">إعادة تعيين</button>
          </div>
        </div>
      </div>

      <button class="btn-export" onclick="app.exportPDF()">
        <span>📄</span> تصدير PDF
      </button>
      <button class="btn-refresh" onclick="app.refresh()">
        <span class="refresh-icon">↺</span>
        تحديث
      </button>
      <span id="last-update" class="last-update"></span>
    </div>
  </header>

  <!-- شريط التنقل -->
  <nav class="nav-tabs">
    <div class="nav-tab active" data-view="overview">
      <span>📊</span> النظرة العامة
    </div>
    <div class="nav-tab" data-view="stages">
      <span>🏫</span> المراحل
    </div>
    <div class="nav-tab" data-view="teams">
      <span>👥</span> الفرق
    </div>
    <div class="nav-tab" data-view="quality">
      <span>⭐</span> الجودة
    </div>
    <div class="nav-tab" data-view="analytics">
      <span>📈</span> التحليلات
    </div>
    <div class="nav-tab" data-view="comparison">
      <span>🔄</span> المقارنة
    </div>
    <div class="nav-tab" data-view="search">
      <span>🔍</span> البحث
    </div>
    <div class="nav-tab" data-view="alerts">
      <span>🔔</span> التنبيهات
    </div>
    <div class="nav-tab" data-view="admin">
      <span>⚙️</span> لوحة التحكم
    </div>
  </nav>

  <!-- المحتوى الرئيسي -->
  <main class="main-content">
    <!-- النظرة العامة -->
    <div id="view-overview" class="view active"></div>

    <!-- المراحل -->
    <div id="view-stages" class="view"></div>

    <!-- الفرق -->
    <div id="view-teams" class="view"></div>

    <!-- الجودة -->
    <div id="view-quality" class="view"></div>

    <!-- تفاصيل الفريق -->
    <div id="view-team-detail" class="view"></div>

    <!-- التحليلات -->
    <div id="view-analytics" class="view"></div>

    <!-- المقارنة -->
    <div id="view-comparison" class="view"></div>

    <!-- البحث -->
    <div id="view-search" class="view"></div>

    <!-- التنبيهات -->
    <div id="view-alerts" class="view"></div>

    <!-- لوحة التحكم -->
    <div id="view-admin" class="view"></div>
  </main>

  <!-- إشعار -->
  <div id="toast" class="toast"></div>

  <!-- السكربتات -->
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
